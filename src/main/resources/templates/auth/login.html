<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: WhiteSmoke;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-form {
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="login-form">
        <h2 class="text-center">Please sign in</h2>
        <form th:action="@{/process_login}" method="post">
            <div class="mb-3">
                <input type="text" class="form-control" name="username" placeholder="Email address" autofocus>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" name="password" placeholder="Password">
            </div>
            <div class="mb-3">
                <input type="submit" class="btn btn-primary w-100" value="Sign in">
            </div>
            <div th:if="${param.error}" style="color: red;">
                Неправильные имя или пароль
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
